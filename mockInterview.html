<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Interview</title>
    <link rel="stylesheet" href="styleLogin.css">
</head>

<body>

    <!-- Main Mock Interview Card -->
    <div class="glass-card">
        <h1>🎤 Mock Interview</h1>
        <p>Practice placement interviews and improve your confidence.</p>
        <button>Start Interview</button>
    </div>

    <!-- Interview Types -->
    <div class="interview-grid">

        <div class="card">
            <h2>💻 Technical Interview</h2>
            <p>Practice DSA, OOPs, DBMS and CS fundamentals.</p>
            <button>Start</button>
        </div>

        <div class="card">
            <h2>🧑‍💼 HR Interview</h2>
            <p>Prepare for HR rounds and common interview questions.</p>
            <button>Start</button>
        </div>

        <div class="card">
            <h2>🗣 Behavioral Interview</h2>
            <p>Improve communication and problem-solving responses.</p>
            <button>Start</button>
        </div>

    </div>

</body>
</html>
