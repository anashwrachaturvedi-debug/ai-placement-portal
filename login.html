<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PlacementPrep AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg custom-navbar mt-3">
        <div class="container">
            <a class="navbar-brand text-white fw-bold" href="index.html">🚀 PlacementPrep AI</a>
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active-link" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="min-vh-100 d-flex justify-content-center align-items-center">

        <div class="login-container">

            <h2>Welcome Back 👋</h2>
            <p class="login-sub">Login to your PlacementPrep AI account</p>

            <form>
                <div class="mb-3 text-start">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter Email">
                </div>

                <div class="mb-4 text-start">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter Password">
                </div>

                <button type="button" class="btn btn-primary w-100 py-2 fw-semibold"
                        onclick="validateLogin()">
                    Login
                </button>
            </form>

            <p class="mt-3">
                Don't have an account?
                <a href="register.html">Register</a>
            </p>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scriptLogin.js"></script>
</body>
</html>
