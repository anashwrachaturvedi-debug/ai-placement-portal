<!DOCTYPE html>
<html>
    <head>
    <title>LOGIN PAGE</title>
    <link rel="stylesheet" href="styleLogin.css">
    </head>
    <body>
    <div class="login-container">

    <h2>Login</h2>

    <form>

        <input
            type="email"
            id="email"
            placeholder="Enter Email">

        <input
            type="password"
            id="password"
            placeholder="Enter Password">

        <button
            type="button"
            onclick="validateLogin()">

            Login

        </button>

    </form>

</div>
    </body>
    <script src="scriptLogin.js"></script>
</html>
