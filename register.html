<!DOCTYPE html>
<!-- Tells browser this is an HTML5 document -->

<html>

<head>

    <!-- Text shown in browser tab -->
    <title>Register - PlacementPrep AI</title>

    <!-- Connect CSS file -->
    <link rel="stylesheet" href="styleLogin.css">

</head>

<body>

    <!-- Main registration card -->
    <div class="login-container">

        <!-- Main heading -->
        <h2>Create Account</h2>

        <!-- Registration form -->
        <form>

            <!-- User's full name -->
            <input
                type="text"
                placeholder="Full Name">

            <!-- User email -->
            <input
                type="email"
                placeholder="Enter Email">

            <!-- Password field -->
            <input
                type="password"
                placeholder="Create Password">

            <!-- Confirm password field -->
            <input
                type="password"
                placeholder="Confirm Password">

            <!-- Register button -->
            <button type="submit">

                Register

            </button>

        </form>

        <!-- Link to login page -->
        <p>

            Already have an account?

            <a href="login.html">

                Login

            </a>

        </p>

    </div>
    <button onclick="registerUser()">
Register
</button>
</body>

</html>
